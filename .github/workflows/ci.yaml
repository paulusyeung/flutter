name: CI

on:
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # Pinned to match local dev (3.41.9). Floating `channel: stable` picked up
      # 3.44.1, which made IconData final and added TextInput members that
      # material_design_icons_flutter / super_editor / re_editor don't implement
      # (re_editor has no fixed release on pub.dev). Bump deliberately — verify
      # those three deps compile first — never let stable drift do it.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Foundational invariants — forbid per_page=999999
        run: |
          if grep -RnE 'per_page=\s*[0-9]{4,}' lib/ 2>/dev/null; then
            echo "::error::Found a per_page value over 1000 — pagination must stay capped." >&2
            exit 1
          fi

      - name: Foundational invariants — forbid double for money
        run: |
          if grep -RnE 'double\s+(balance|amount|total|paid_to_date|cost|price|discount|tax_rate)\b' lib/ 2>/dev/null; then
            echo "::error::Money must be Decimal, never double. See CLAUDE.md." >&2
            exit 1
          fi

      # Security invariants. High-specificity patterns only — anything noisier
      # has to live in the analyzer or a code review, not a grep gate.
      - name: Security invariants — forbid committed credentials
        run: |
          # JWT-shaped tokens (header.payload prefix). Real JWTs never belong
          # in source; this catches accidental copy-paste from a curl test.
          if grep -RnE 'eyJ[A-Za-z0-9_-]{10,}\.eyJ' lib/ 2>/dev/null; then
            echo "::error::JWT-shaped string committed to lib/. Strip it." >&2
            exit 1
          fi
          # Hardcoded bearer headers. The api client builds these from
          # secure-storage credentials; a literal Bearer line means someone
          # pasted a session token in.
          if grep -RnE "['\"]Bearer\s+[A-Za-z0-9._\-]{16,}['\"]" lib/ 2>/dev/null; then
            echo "::error::Hardcoded 'Bearer <token>' header in lib/." >&2
            exit 1
          fi

      # Web compile gate. The authoritative check for web-platform
      # regressions: `flutter analyze` runs against the VM target and won't
      # catch a native-only API leaking into the reachable web tree. Built
      # with `--wasm` so it doubles as the WebAssembly gate — dart2wasm is
      # stricter than dart2js (it rejects `dart:html`), so this fails fast if
      # a dependency ever reintroduces a web-incompatible import. The `--wasm`
      # build also emits the dart2js fallback, so it stays a full web gate.
      # The native-assets hook (`hooks: user_defines: sqlite3: source:
      # sqlite3mc`) targets native builds and is inert here.
      - name: Build web (compile gate, --wasm)
        run: flutter build web --wasm --release

      - name: Build iOS (no codesign)
        run: flutter build ios --no-codesign

      - name: Build macOS (unsigned)
        run: |
          flutter build macos --release --config-only
          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            build

      # Integration tests run against macOS desktop. They take over the
      # foreground app, so they must NEVER be run on a developer's dev box —
      # this is the only place they execute. See CLAUDE.md "Integration
      # tests".
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      # Globs the whole integration_test/ dir so every file is auto-included:
      # the mocked smoke suite (app_smoke_test.dart) AND the live suite
      # (demo_api_test.dart), which boots the real app against
      # demo.invoiceninja.com. Blocking: a real failure reds the build. The
      # live suite self-skips (markTestSkipped) when the demo server is
      # unreachable, so a demo outage does NOT cause a false red. The
      # timeout bounds a network hang so it can't wedge the job for hours.
      - name: Integration tests (macOS, incl. live demo API)
        timeout-minutes: 25
        run: flutter test integration_test/ -d macos

      # Pixel screenshots of live-suite failures (the test writes them here
      # only when GITHUB_ACTIONS=true). Runs even when the step above failed
      # so a red integration run still publishes its forensics; harmless
      # no-op when everything passed.
      - name: Upload integration failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-failure-screenshots
          path: build/integration-failures/
          if-no-files-found: ignore
          retention-days: 14

  # Web integration smoke. Separate job (cheap Ubuntu runner, headless
  # Chrome) so it runs in parallel with the macOS suite. Only the mocked
  # app_smoke_test.dart runs here — it uses in-memory Drift +
  # InMemoryTokenStorage + MockClient, all web-compatible. The live demo/*
  # suite and filesystem/secure-storage unit tests are @TestOn('vm') /
  # macOS-only and intentionally don't run on web. Non-blocking for now
  # (continue-on-error) until the headless-Chrome path proves stable; flip
  # to blocking once it has a green track record. See CLAUDE.md §
  # Integration tests.
  integration-web:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      # Keep in lockstep with the analyze-and-test job's pin above.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - uses: nanasess/setup-chromedriver@v2

      - name: Start chromedriver
        run: chromedriver --port=4444 &

      - name: Integration smoke (Chrome, headless)
        timeout-minutes: 20
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_smoke_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless
