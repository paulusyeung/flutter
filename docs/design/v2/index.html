<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Invoice Ninja v2 — Mocks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Geist", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="patterns.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

// ─────────── Foundations card ───────────
function Foundations() {
  return (
    <div style={{ width: '100%', height: '100%', background: IN.surface, padding: 28, fontFamily: IN.sans, color: IN.ink, overflow: 'hidden' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 28, height: '100%' }}>
        <div>
          <div style={{ fontFamily: IN.mono, fontSize: 11, color: IN.ink3, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 600 }}>Invoice Ninja v2</div>
          <h1 style={{ fontFamily: IN.sans, fontSize: 40, fontWeight: 600, color: IN.ink, letterSpacing: -1, lineHeight: 1.05, margin: '8px 0 12px' }}>A workspace‑first<br/>billing system.</h1>
          <p style={{ fontFamily: IN.sans, fontSize: 14, color: IN.ink2, lineHeight: 1.55, maxWidth: 460, margin: 0 }}>
            One account, up to ten workspaces. Three levels of structure — <b style={{ color: IN.ink }}>Workspace</b> → <b style={{ color: IN.ink }}>Section</b> → <b style={{ color: IN.ink }}>Screen</b> — keep multi‑business accounting fast on desktop and clean on phone.
          </p>

          <div style={{ marginTop: 28, display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {[
              ['Bg', IN.bg], ['Surface', IN.surface], ['Border', IN.border],
              ['Ink', IN.ink], ['Ink 2', IN.ink2], ['Ink 3', IN.ink3],
              ['Accent', IN.accent], ['Lime', IN.accentLime], ['Rail', IN.rail],
              ['Paid', IN.paid], ['Overdue', IN.overdue], ['Partial', IN.partial],
            ].map(([l, c]) => (
              <div key={l} style={{ width: 86 }}>
                <div style={{ height: 50, background: c, borderRadius: 6, border: c==='#FFFFFF'||c===IN.bg?`1px solid ${IN.border}`:'none' }}/>
                <div style={{ fontFamily: IN.sans, fontSize: 10.5, color: IN.ink3, marginTop: 4 }}>{l}</div>
                <div style={{ fontFamily: IN.mono, fontSize: 10, color: IN.ink, letterSpacing: -0.2 }}>{c.toUpperCase()}</div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 28, display: 'flex', gap: 32 }}>
            <div>
              <div style={{ fontFamily: IN.mono, fontSize: 10, color: IN.ink3, letterSpacing: 0.8, textTransform: 'uppercase', fontWeight: 600 }}>Sans · Geist</div>
              <div style={{ fontFamily: IN.sans, fontSize: 36, fontWeight: 600, letterSpacing: -0.7, color: IN.ink }}>Aa</div>
              <div style={{ fontFamily: IN.sans, fontSize: 13, color: IN.ink2 }}>UI, headlines, labels</div>
            </div>
            <div>
              <div style={{ fontFamily: IN.mono, fontSize: 10, color: IN.ink3, letterSpacing: 0.8, textTransform: 'uppercase', fontWeight: 600 }}>Mono · Geist Mono</div>
              <div style={{ fontFamily: IN.mono, fontSize: 36, fontWeight: 500, letterSpacing: -0.6, color: IN.ink }}>$1,240</div>
              <div style={{ fontFamily: IN.sans, fontSize: 13, color: IN.ink2 }}>Tabular numbers</div>
            </div>
          </div>
        </div>

        {/* Right column — system anatomy */}
        <div style={{ background: IN.surfaceAlt, borderRadius: IN.r3, border: `1px solid ${IN.border}`, padding: 22, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontFamily: IN.mono, fontSize: 10, color: IN.ink3, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 600 }}>Information architecture</div>
            <div style={{ marginTop: 18 }}>
              {[
                { l: 'Workspace', s: 'Acme Studio · Northwind · Lumen … up to 10', tone: IN.accent, level: 0 },
                { l: 'Section',   s: 'Dashboard · Invoices · Clients · Quotes · …', tone: IN.ink,    level: 1 },
                { l: 'Screen',    s: 'List · Editor · Detail · Settings panel',     tone: IN.ink3,   level: 2 },
              ].map((row) => (
                <div key={row.l} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 14, paddingLeft: row.level*20 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: row.tone, marginTop: 6, flexShrink: 0 }}/>
                  <div>
                    <div style={{ fontFamily: IN.sans, fontSize: 14, fontWeight: 600, color: IN.ink }}>{row.l}</div>
                    <div style={{ fontFamily: IN.sans, fontSize: 12, color: IN.ink3, lineHeight: 1.4 }}>{row.s}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div style={{ paddingTop: 18, borderTop: `1px solid ${IN.border}` }}>
            <div style={{ fontFamily: IN.mono, fontSize: 10, color: IN.ink3, letterSpacing: 1, textTransform: 'uppercase', fontWeight: 600, marginBottom: 10 }}>Pills</div>
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <Pill status="paid"/><Pill status="sent"/><Pill status="partial"/>
              <Pill status="overdue">Overdue · 3d</Pill><Pill status="draft"/>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────── App ───────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="found" title="Invoice Ninja v2 · Foundations" subtitle="Color, type, and the three‑level workspace model">
        <DCArtboard id="f1" label="System overview" width={1280} height={720}>
          <Foundations/>
        </DCArtboard>
      </DCSection>

      <DCSection id="desktop-patterns" title="Company switcher · Desktop" subtitle="Three patterns for moving between up to 10 workspaces">
        <DCArtboard id="pa" label="A · Persistent rail (Slack‑style)" width={1440} height={900}>
          <PatternARail>
            <DashboardScreen companyName="Acme Studio"/>
          </PatternARail>
        </DCArtboard>
        <DCArtboard id="pb" label="B · Top dropdown · closed" width={1440} height={900}>
          <PatternBDropdown>
            <DashboardScreen companyName="Acme Studio"/>
          </PatternBDropdown>
        </DCArtboard>
        <DCArtboard id="pb2" label="B · Top dropdown · open" width={1440} height={900}>
          <PatternBDropdown dropOpen>
            <DashboardScreen companyName="Acme Studio"/>
          </PatternBDropdown>
        </DCArtboard>
        <DCArtboard id="pc" label="C · Workspace hub (home page)" width={1440} height={900}>
          <PatternCHub/>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile-patterns" title="Company switcher · Mobile" subtitle="The same three patterns adapted to 390 × 844">
        <DCArtboard id="ma" label="A · Top company strip" width={390} height={844}>
          <PatternAMobile/>
        </DCArtboard>
        <DCArtboard id="mb" label="B · Top dropdown" width={390} height={844}>
          <PatternBMobile/>
        </DCArtboard>
        <DCArtboard id="mb2" label="B · Switcher open" width={390} height={844}>
          <PatternBMobile dropOpen/>
        </DCArtboard>
        <DCArtboard id="mc" label="C · Workspace home" width={390} height={844}>
          <PatternCMobile/>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens-desktop" title="Key screens · Desktop" subtitle="Built on Pattern B · workspace dropdown lives in the sidebar header">
        <DCArtboard id="d-inv" label="Invoices · list" width={1440} height={900}>
          <PatternBDropdown active="invoices">
            <InvoicesScreen companyName="Acme Studio"/>
          </PatternBDropdown>
        </DCArtboard>
        <DCArtboard id="d-edit" label="Invoice editor" width={1440} height={900}>
          <PatternBDropdown active="invoices">
            <InvoiceEditorScreen companyName="Acme Studio"/>
          </PatternBDropdown>
        </DCArtboard>
        <DCArtboard id="d-cli" label="Clients" width={1440} height={900}>
          <PatternBDropdown active="clients">
            <ClientsScreen companyName="Acme Studio"/>
          </PatternBDropdown>
        </DCArtboard>
      </DCSection>

      <DCSection id="screens-mobile" title="Key screens · Mobile" subtitle="Native bottom tab bar + center FAB for the most common action">
        <DCArtboard id="m-inv" label="Invoices · list" width={390} height={844}>
          <MobileInvoicesScreen companyName="Acme Studio"/>
        </DCArtboard>
        <DCArtboard id="m-edit" label="Invoice editor" width={390} height={844}>
          <MobileEditorScreen/>
        </DCArtboard>
      </DCSection>

      <DCPostIt top={140} right={32} rotate={2} width={220}>
        Going with Pattern B (dropdown) for the key screens — gives one workspace the full screen, switching one click away.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
