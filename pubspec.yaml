name: admin
description: "Invoice Ninja admin client — Flutter rebuild (iOS, macOS, web)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  collection: ^1.18.0
  connectivity_plus: ^7.1.1
  crop_your_image: ^2.0.0
  crypto: ^3.0.7
  decimal: ^3.0.0
  desktop_drop: ^0.7.0
  drift: ^2.33.0
  file_picker: ^12.0.0-beta.5
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_contacts: ^2.2.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  http: ^1.5.0
  image_picker: ^1.0.0
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.4.9
  intl: any
  json_annotation: ^4.12.0
  local_auth: ^3.0.1
  logging: ^1.2.0
  overflow_view: ^0.5.0
  package_info_plus: ^10.1.0
  path: ^1.9.1
  path_provider: ^2.1.4
  printing: ^5.13.0
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  sentry_flutter: ^9.21.0
  sign_in_with_apple: ^8.1.0
  sqlite3: ^3.3.2
  super_editor: any
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  web: ^1.1.0
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  integration_test:
    sdk: flutter
  json_serializable: ^6.14.0

dependency_overrides:
  # re_editor's transitive isolate_manager 4.x → isolate_contactor uses
  # `dart:html`, which dart2wasm rejects (blocks `flutter build web --wasm`).
  # isolate_manager 6.x is wasm-clean and on `package:web`.
  isolate_manager: ^6.3.2
  # super_editor's active upstream is Flutter-Bounty-Hunters; the superlistapp
  # fork stalled in Jan 2026 (pre-3.44) and won't compile under Flutter 3.44
  # (its TextInputConnectionDecorator misses TextInputConnection.updateStyle).
  # The FBH `stable` branch carries the full 3.44 IME surface. Pinned to a SHA
  # for reproducibility.
  super_editor:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor
      path: super_editor
      ref: 2408aa52579a6d13479b38da980dc3093c2982a8

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
    - assets/images/gateway_logos/
