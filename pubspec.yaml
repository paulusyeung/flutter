name: admin
description: 'Client for Invoice Ninja'
publish_to: 'none'
version: 5.1.1+2

environment:
  sdk: ^3.11.5

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_foreground: "assets/images/icon.png"
  adaptive_icon_background: "#000000"

# Dependency versions: `flutter pub outdated` lists ~22 transitive packages with a
# newer "Latest" (analyzer 13, xml 7, qr 4, meta / vector_math / the test family, …)
# that are NOT updatable from here — `flutter pub upgrade --major-versions` moves none
# of them. Each is capped by an already-latest upstream (freezed pins analyzer <11; pdf
# pins xml <7; qr_flutter pins qr <4; in_app_purchase pins its android impl) or by the
# Flutter SDK's exact pins (meta, vector_math, test*). They clear only when those
# upstreams widen their bounds or Flutter ships a newer stable. Full blocker map +
# routine-bump recipe: docs/setup.md § Dependency updates. (verified 2026-06-02, Flutter 3.44.1)
dependencies:
  collection: ^1.18.0
  connectivity_plus: ^7.1.1
  crop_your_image: ^2.0.0
  crypto: ^3.0.7
  decimal: ^3.0.0
  desktop_drop: ^0.7.0
  drift: ^2.33.0
  file_picker: ^12.0.0-beta.5
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_contacts: ^2.2.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.3.1
  flutter_widget_from_html_core: ^0.16.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  http: ^1.5.0
  image_picker: ^1.0.0
  in_app_purchase: ^3.2.0
  in_app_purchase_storekit: ^0.4.9
  intl: any
  json_annotation: ^4.12.0
  local_auth: ^3.0.1
  logging: ^1.2.0
  overflow_view: ^0.5.0
  package_info_plus: ^10.1.0
  path: ^1.9.1
  path_provider: ^2.1.4
  printing: ^5.13.0
  provider: ^6.1.2
  qr_flutter: ^4.1.0
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  sentry_flutter: ^9.21.0
  sign_in_with_apple: ^8.1.0
  sqlite3: ^3.3.2
  super_editor: any
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  web: ^1.1.0
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.33.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  integration_test:
    sdk: flutter
  json_serializable: ^6.14.0

dependency_overrides:
  # re_editor's transitive isolate_manager 4.x → isolate_contactor uses
  # `dart:html`, which dart2wasm rejects (blocks `flutter build web --wasm`).
  # isolate_manager 6.x is wasm-clean and on `package:web`.
  isolate_manager: ^6.3.2
  # super_editor's active upstream is Flutter-Bounty-Hunters; the superlistapp
  # fork stalled in Jan 2026 (pre-3.44) and won't compile under Flutter 3.44
  # (its TextInputConnectionDecorator misses TextInputConnection.updateStyle).
  # The FBH `stable` branch carries the full 3.44 IME surface. Pinned to a SHA
  # for reproducibility.
  super_editor:
    git:
      url: https://github.com/Flutter-Bounty-Hunters/super_editor
      path: super_editor
      ref: 2408aa52579a6d13479b38da980dc3093c2982a8

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
    - assets/images/gateway_logos/
  # Bundled app fonts (variable TTFs) so the web app loads them from our own
  # origin instead of fetching from fonts.gstatic.com at runtime. Each is a
  # single variable file; a TextStyle's `fontWeight` drives its `wght` axis.
  # The invoice designer still fetches arbitrary user-chosen fonts on demand
  # via `google_fonts` (GoogleFonts.getFont) — that's intentional.
  fonts:
    - family: Inter Tight
      fonts:
        - asset: assets/fonts/InterTight.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
    # Satisfies the Flutter web engine's hardcoded default-font check
    # (canvaskit + skwasm both look for a family literally named "Roboto") so it
    # never downloads Roboto from fonts.gstatic.com at boot. Aliased to the
    # bundled Inter Tight — no extra bytes; any text that hits the engine
    # fallback renders in the app's own typeface.
    - family: Roboto
      fonts:
        - asset: assets/fonts/InterTight.ttf
    # Material Design Icons (Pictogrammers, Apache-2.0). Vendored TTF instead of
    # the `material_design_icons_flutter` package, which subclasses IconData and
    # so can't compile under Flutter 3.44's `final` IconData. Glyphs are
    # referenced as plain const IconData (lib/app/mdi_icons.dart), so the font
    # also tree-shakes to the used glyph subset in release builds.
    - family: Material Design Icons
      fonts:
        - asset: assets/fonts/MaterialDesignIcons.ttf
