name: admin
description: "Invoice Ninja admin client — Flutter rebuild (iOS + macOS)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  connectivity_plus: ^6.0.0
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  decimal: ^3.0.0
  drift: ^2.20.0
  file_picker: ^8.0.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  http: ^1.5.0
  image_picker: ^1.0.0
  intl: any
  json_annotation: ^4.9.0
  logging: ^1.2.0
  package_info_plus: ^8.0.0
  path: ^1.9.1
  path_provider: ^2.1.4
  provider: ^6.1.2
  sign_in_with_apple: ^7.0.1
  sqlcipher_flutter_libs: ^0.6.0
  super_editor: any
  super_editor_markdown: any
  synchronized: ^3.1.0
  url_launcher: ^6.3.0
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.13
  drift_dev: ^2.20.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0

dependency_overrides:
  # super_editor's monorepo declares `test` as a main dep on attributed_text;
  # the conflict with freezed's analyzer ^6.5/^7.0 range needs analyzer
  # and matcher to be forced compatible across both sides.
  analyzer: any
  matcher: any
  super_editor:
    git:
      url: https://github.com/superlistapp/super_editor
      path: super_editor
      ref: 9655c7f987968d680f83fc095a604f86d9ad15a1
  super_editor_markdown:
    git:
      url: https://github.com/superlistapp/super_editor
      path: super_editor_markdown
      ref: 9655c7f987968d680f83fc095a604f86d9ad15a1
  test_api: any

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
